<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="arcanum_cards_base.css">
</head>
<body class="tarot-card" style="width:550px; height:950px;">
<div class="card-frame size-full">

  <!-- Frame -->
  <div class="border-outer"></div>
  <div class="border-inner"></div>

  <svg class="corner corner-tl" viewBox="0 0 40 40" fill="none">
    <path d="M0 40 L0 12 Q0 0 12 0 L40 0" stroke="var(--card-border)" stroke-width="1" fill="none" opacity="0.5"/>
    <circle cx="10" cy="10" r="2.5" stroke="var(--card-border)" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="10" cy="10" r="1" fill="var(--card-border)" opacity="0.3"/>
  </svg>
  <svg class="corner corner-tr" viewBox="0 0 40 40" fill="none">
    <path d="M0 40 L0 12 Q0 0 12 0 L40 0" stroke="var(--card-border)" stroke-width="1" fill="none" opacity="0.5"/>
    <circle cx="10" cy="10" r="2.5" stroke="var(--card-border)" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="10" cy="10" r="1" fill="var(--card-border)" opacity="0.3"/>
  </svg>
  <svg class="corner corner-bl" viewBox="0 0 40 40" fill="none">
    <path d="M0 40 L0 12 Q0 0 12 0 L40 0" stroke="var(--card-border)" stroke-width="1" fill="none" opacity="0.5"/>
    <circle cx="10" cy="10" r="2.5" stroke="var(--card-border)" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="10" cy="10" r="1" fill="var(--card-border)" opacity="0.3"/>
  </svg>
  <svg class="corner corner-br" viewBox="0 0 40 40" fill="none">
    <path d="M0 40 L0 12 Q0 0 12 0 L40 0" stroke="var(--card-border)" stroke-width="1" fill="none" opacity="0.5"/>
    <circle cx="10" cy="10" r="2.5" stroke="var(--card-border)" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="10" cy="10" r="1" fill="var(--card-border)" opacity="0.3"/>
  </svg>

  <div class="card-number">VI</div>
  <div class="card-name">The Lovers</div>

  <!-- ================ ILLUSTRATION ================ -->
  <div class="illustration">
    <svg width="500" height="800" viewBox="0 0 500 800" fill="none">

      <!-- Warm, radiant glow from above — the angel's blessing -->
      <radialGradient id="blessingglow" cx="50%" cy="20%" r="35%">
        <stop offset="0%" stop-color="var(--card-line)" stop-opacity="0.12"/>
        <stop offset="50%" stop-color="var(--card-line)" stop-opacity="0.04"/>
        <stop offset="100%" stop-color="var(--card-line)" stop-opacity="0"/>
      </radialGradient>
      <rect width="500" height="500" fill="url(#blessingglow)"/>

      <!-- Connection glow between the two figures -->
      <radialGradient id="unionglow" cx="50%" cy="58%" r="20%">
        <stop offset="0%" stop-color="var(--card-accent-light)" stop-opacity="0.07"/>
        <stop offset="100%" stop-color="var(--card-accent)" stop-opacity="0"/>
      </radialGradient>
      <rect y="300" width="500" height="400" fill="url(#unionglow)"/>

      <!-- ======== THE ANGEL ======== -->
      <!-- Raphael — hovering above, arms outstretched in blessing -->
      <g transform="translate(250, 110)">
        <!-- Radiance halo -->
        <circle cx="0" cy="0" r="55" fill="none" stroke="var(--card-line)" stroke-width="0.5" opacity="0.12"/>
        <circle cx="0" cy="0" r="45" fill="none" stroke="var(--card-line)" stroke-width="0.4" opacity="0.1"/>

        <!-- Wings — large, geometric, spread wide -->
        <!-- Left wing — three layered arcs -->
        <path d="M-20 10 Q-60 -10 -95 10 Q-110 18 -120 30"
              stroke="var(--card-line)" stroke-width="1.5" fill="none" opacity="0.45"/>
        <path d="M-18 16 Q-55 0 -85 18 Q-100 26 -108 36"
              stroke="var(--card-line)" stroke-width="1" fill="none" opacity="0.3"/>
        <path d="M-16 22 Q-50 10 -75 26 Q-88 32 -96 40"
              stroke="var(--card-line-dim)" stroke-width="0.7" fill="none" opacity="0.2"/>
        <!-- Right wing -->
        <path d="M20 10 Q60 -10 95 10 Q110 18 120 30"
              stroke="var(--card-line)" stroke-width="1.5" fill="none" opacity="0.45"/>
        <path d="M18 16 Q55 0 85 18 Q100 26 108 36"
              stroke="var(--card-line)" stroke-width="1" fill="none" opacity="0.3"/>
        <path d="M16 22 Q50 10 75 26 Q88 32 96 40"
              stroke="var(--card-line-dim)" stroke-width="0.7" fill="none" opacity="0.2"/>

        <!-- Head -->
        <circle cx="0" cy="-10" r="18" fill="var(--card-fill)" stroke="var(--card-line)" stroke-width="1.5"/>
        <circle cx="0" cy="-12" r="10" fill="none" stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.45"/>
        <circle cx="0" cy="-12" r="4" fill="var(--card-line)" opacity="0.4"/>

        <!-- Body — small, ethereal, suggested -->
        <path d="M0 8 L-10 40 L0 55 L10 40 Z"
              fill="var(--card-fill-light)" fill-opacity="0.2" stroke="var(--card-line)" stroke-width="1" opacity="0.4"/>

        <!-- Arms outstretched — blessing gesture -->
        <path d="M-8 18 Q-28 14 -45 22" stroke="var(--card-line)" stroke-width="1" fill="none" opacity="0.4"/>
        <path d="M8 18 Q28 14 45 22" stroke="var(--card-line)" stroke-width="1" fill="none" opacity="0.4"/>
        <!-- Hands — open, palms down -->
        <circle cx="-47" cy="23" r="3" fill="none" stroke="var(--card-line)" stroke-width="0.6" opacity="0.3"/>
        <circle cx="47" cy="23" r="3" fill="none" stroke="var(--card-line)" stroke-width="0.6" opacity="0.3"/>
      </g>

      <!-- ======== RAYS OF BLESSING ======== -->
      <!-- Descending from the angel toward both figures -->
      <line x1="210" y1="160" x2="170" y2="320"
            stroke="var(--card-line)" stroke-width="0.5" fill="none" opacity="0.06" stroke-dasharray="4 8"/>
      <line x1="250" y1="165" x2="250" y2="340"
            stroke="var(--card-line)" stroke-width="0.5" fill="none" opacity="0.08" stroke-dasharray="4 8"/>
      <line x1="290" y1="160" x2="330" y2="320"
            stroke="var(--card-line)" stroke-width="0.5" fill="none" opacity="0.06" stroke-dasharray="4 8"/>

      <!-- ======== LEFT FIGURE ======== -->
      <!-- Standing, facing inward toward the other figure -->
      <g transform="translate(170, 380)">
        <!-- Head -->
        <circle cx="0" cy="0" r="22" fill="var(--card-fill)" stroke="var(--card-line)" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="14" fill="none" stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.45"/>
        <circle cx="0" cy="0" r="5" fill="var(--card-line)" opacity="0.35"/>

        <!-- Gaze toward the other figure -->
        <line x1="8" y1="-4" x2="16" y2="-6"
              stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.25"/>

        <!-- Body — standing, slightly turned inward -->
        <path d="M0 22 L-18 110 L0 155 L18 110 Z"
              fill="var(--card-fill-light)" fill-opacity="0.3" stroke="var(--card-line)" stroke-width="1.2"/>

        <!-- Legs -->
        <line x1="-8" y1="155" x2="-14" y2="230" stroke="var(--card-line)" stroke-width="1.2" opacity="0.55"/>
        <line x1="8" y1="155" x2="14" y2="230" stroke="var(--card-line)" stroke-width="1.2" opacity="0.55"/>
        <!-- Feet -->
        <ellipse cx="-14" cy="232" rx="8" ry="3" fill="none" stroke="var(--card-line)" stroke-width="0.8" opacity="0.35"/>
        <ellipse cx="14" cy="232" rx="8" ry="3" fill="none" stroke="var(--card-line)" stroke-width="0.8" opacity="0.35"/>

        <!-- Arm reaching toward the other figure -->
        <path d="M14 40 Q30 35 50 30 Q65 26 78 28"
              stroke="var(--card-line)" stroke-width="1.5" fill="none" opacity="0.7"/>
        <!-- Other arm relaxed at side -->
        <path d="M-14 40 Q-28 60 -30 85"
              stroke="var(--card-line)" stroke-width="1" fill="none" opacity="0.45"/>
      </g>

      <!-- ======== RIGHT FIGURE ======== -->
      <g transform="translate(330, 380)">
        <!-- Head -->
        <circle cx="0" cy="0" r="22" fill="var(--card-fill)" stroke="var(--card-line)" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="14" fill="none" stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.45"/>
        <circle cx="0" cy="0" r="5" fill="var(--card-line)" opacity="0.35"/>

        <!-- Gaze toward the other figure -->
        <line x1="-8" y1="-4" x2="-16" y2="-6"
              stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.25"/>

        <!-- Body -->
        <path d="M0 22 L-18 110 L0 155 L18 110 Z"
              fill="var(--card-fill-light)" fill-opacity="0.3" stroke="var(--card-line)" stroke-width="1.2"/>

        <!-- Legs -->
        <line x1="-8" y1="155" x2="-14" y2="230" stroke="var(--card-line)" stroke-width="1.2" opacity="0.55"/>
        <line x1="8" y1="155" x2="14" y2="230" stroke="var(--card-line)" stroke-width="1.2" opacity="0.55"/>
        <ellipse cx="-14" cy="232" rx="8" ry="3" fill="none" stroke="var(--card-line)" stroke-width="0.8" opacity="0.35"/>
        <ellipse cx="14" cy="232" rx="8" ry="3" fill="none" stroke="var(--card-line)" stroke-width="0.8" opacity="0.35"/>

        <!-- Arm reaching toward the other figure -->
        <path d="M-14 40 Q-30 35 -50 30 Q-65 26 -78 28"
              stroke="var(--card-line)" stroke-width="1.5" fill="none" opacity="0.7"/>
        <!-- Other arm relaxed -->
        <path d="M14 40 Q28 60 30 85"
              stroke="var(--card-line)" stroke-width="1" fill="none" opacity="0.45"/>
      </g>

      <!-- ======== THE CONNECTION ======== -->
      <!-- Where their reaching hands meet — the heart of the card -->
      <!-- Not touching — almost touching. The space between is the meaning. -->
      <circle cx="250" cy="408" r="4" fill="var(--card-accent-light)" opacity="0.3"/>
      <circle cx="250" cy="408" r="10" fill="none" stroke="var(--card-accent-light)" stroke-width="0.8" opacity="0.2"/>
      <circle cx="250" cy="408" r="18" fill="none" stroke="var(--card-accent)" stroke-width="0.5" opacity="0.1"/>

      <!-- ======== TREE OF KNOWLEDGE — behind right figure ======== -->
      <!-- With serpent coiled and fruit/apples -->
      <g transform="translate(395, 360)">
        <!-- Trunk -->
        <line x1="0" y1="60" x2="0" y2="250" stroke="var(--card-accent)" stroke-width="1.5" opacity="0.3"/>
        <!-- Branches — organic curves -->
        <path d="M0 80 Q-20 60 -30 40" stroke="var(--card-accent)" stroke-width="1" fill="none" opacity="0.25"/>
        <path d="M0 80 Q20 60 30 45" stroke="var(--card-accent)" stroke-width="1" fill="none" opacity="0.25"/>
        <path d="M0 110 Q-25 95 -35 80" stroke="var(--card-accent)" stroke-width="0.8" fill="none" opacity="0.2"/>
        <path d="M0 110 Q22 98 32 85" stroke="var(--card-accent)" stroke-width="0.8" fill="none" opacity="0.2"/>
        <!-- Canopy suggested by circle -->
        <circle cx="0" cy="50" r="40" fill="none" stroke="var(--card-accent)" stroke-width="0.5" opacity="0.08"/>
        <!-- Fruit — small accent circles -->
        <circle cx="-22" cy="48" r="4" fill="var(--card-accent)" fill-opacity="0.2" stroke="var(--card-accent-light)" stroke-width="0.8" opacity="0.35"/>
        <circle cx="18" cy="52" r="4" fill="var(--card-accent)" fill-opacity="0.2" stroke="var(--card-accent-light)" stroke-width="0.8" opacity="0.35"/>
        <circle cx="-8" cy="36" r="3.5" fill="var(--card-accent)" fill-opacity="0.15" stroke="var(--card-accent-light)" stroke-width="0.7" opacity="0.3"/>
        <circle cx="10" cy="40" r="3.5" fill="var(--card-accent)" fill-opacity="0.15" stroke="var(--card-accent-light)" stroke-width="0.7" opacity="0.3"/>
        <circle cx="0" cy="30" r="3" fill="var(--card-accent)" fill-opacity="0.15" stroke="var(--card-accent-light)" stroke-width="0.6" opacity="0.25"/>
        <!-- Serpent coiling trunk -->
        <path d="M-6 150 Q10 140 -4 125 Q-14 112 6 105 Q16 98 -2 88"
              stroke="var(--card-accent-light)" stroke-width="1" fill="none" opacity="0.3"/>
        <!-- Serpent head -->
        <circle cx="-4" cy="86" r="3" fill="var(--card-fill)" stroke="var(--card-accent-light)" stroke-width="0.7" opacity="0.35"/>
      </g>

      <!-- ======== TREE OF LIFE — behind left figure ======== -->
      <!-- Flames/fire instead of fruit -->
      <g transform="translate(105, 360)">
        <!-- Trunk -->
        <line x1="0" y1="60" x2="0" y2="250" stroke="var(--card-line-dim)" stroke-width="1.5" opacity="0.3"/>
        <!-- Branches -->
        <path d="M0 80 Q-20 60 -28 42" stroke="var(--card-line-dim)" stroke-width="1" fill="none" opacity="0.25"/>
        <path d="M0 80 Q20 60 28 45" stroke="var(--card-line-dim)" stroke-width="1" fill="none" opacity="0.25"/>
        <path d="M0 110 Q-22 95 -30 82" stroke="var(--card-line-dim)" stroke-width="0.8" fill="none" opacity="0.2"/>
        <path d="M0 110 Q22 98 30 88" stroke="var(--card-line-dim)" stroke-width="0.8" fill="none" opacity="0.2"/>
        <!-- Canopy -->
        <circle cx="0" cy="50" r="40" fill="none" stroke="var(--card-line-dim)" stroke-width="0.5" opacity="0.08"/>
        <!-- Flames instead of fruit -->
        <path d="M-20 48 Q-24 40 -20 32 Q-16 40 -20 48"
              fill="var(--card-line)" fill-opacity="0.12" stroke="var(--card-line-light)" stroke-width="0.7" opacity="0.35"/>
        <path d="M18 44 Q14 36 18 28 Q22 36 18 44"
              fill="var(--card-line)" fill-opacity="0.12" stroke="var(--card-line-light)" stroke-width="0.7" opacity="0.35"/>
        <path d="M-6 36 Q-10 28 -6 22 Q-2 28 -6 36"
              fill="var(--card-line)" fill-opacity="0.1" stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.3"/>
        <path d="M10 38 Q6 30 10 24 Q14 30 10 38"
              fill="var(--card-line)" fill-opacity="0.1" stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.3"/>
        <path d="M0 28 Q-3 22 0 16 Q3 22 0 28"
              fill="var(--card-line)" fill-opacity="0.1" stroke="var(--card-line-light)" stroke-width="0.5" opacity="0.25"/>
      </g>

      <!-- ======== MOUNTAIN ======== -->
      <!-- Distant, between the two figures — the higher purpose -->
      <path d="M220 640 L250 560 L280 640"
            stroke="var(--card-line-dim)" stroke-width="1.2" fill="none" opacity="0.2"/>
      <!-- Snow cap -->
      <path d="M240 585 L250 560 L260 585"
            stroke="var(--card-line-light)" stroke-width="0.6" fill="none" opacity="0.15"/>

      <!-- ======== GROUND ======== -->
      <path d="M60 640 Q130 630 200 638 Q250 644 300 636 Q370 628 440 640"
            stroke="var(--card-line-dim)" stroke-width="0.8" fill="none" opacity="0.15"/>

      <!-- Grass -->
      <line x1="100" y1="638" x2="98" y2="628" stroke="var(--card-accent)" stroke-width="0.6" opacity="0.15"/>
      <line x1="180" y1="640" x2="178" y2="630" stroke="var(--card-accent)" stroke-width="0.5" opacity="0.12"/>
      <line x1="320" y1="638" x2="322" y2="628" stroke="var(--card-accent)" stroke-width="0.5" opacity="0.12"/>
      <line x1="400" y1="636" x2="402" y2="626" stroke="var(--card-accent)" stroke-width="0.6" opacity="0.15"/>

    </svg>
  </div>
</div>
</body>
</html>
