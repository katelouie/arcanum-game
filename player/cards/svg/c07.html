<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="arcanum_cards_base.css">
</head>
<body class="tarot-card" style="width:550px; height:950px;">
<div class="card-frame size-full">

  <!-- Frame -->
  <div class="border-outer"></div>
  <div class="border-inner"></div>

  <svg class="corner corner-tl" viewBox="0 0 40 40" fill="none">
    <path d="M0 40 L0 12 Q0 0 12 0 L40 0" stroke="var(--card-border)" stroke-width="1" fill="none" opacity="0.5"/>
    <circle cx="10" cy="10" r="2.5" stroke="var(--card-border)" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="10" cy="10" r="1" fill="var(--card-border)" opacity="0.3"/>
  </svg>
  <svg class="corner corner-tr" viewBox="0 0 40 40" fill="none">
    <path d="M0 40 L0 12 Q0 0 12 0 L40 0" stroke="var(--card-border)" stroke-width="1" fill="none" opacity="0.5"/>
    <circle cx="10" cy="10" r="2.5" stroke="var(--card-border)" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="10" cy="10" r="1" fill="var(--card-border)" opacity="0.3"/>
  </svg>
  <svg class="corner corner-bl" viewBox="0 0 40 40" fill="none">
    <path d="M0 40 L0 12 Q0 0 12 0 L40 0" stroke="var(--card-border)" stroke-width="1" fill="none" opacity="0.5"/>
    <circle cx="10" cy="10" r="2.5" stroke="var(--card-border)" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="10" cy="10" r="1" fill="var(--card-border)" opacity="0.3"/>
  </svg>
  <svg class="corner corner-br" viewBox="0 0 40 40" fill="none">
    <path d="M0 40 L0 12 Q0 0 12 0 L40 0" stroke="var(--card-border)" stroke-width="1" fill="none" opacity="0.5"/>
    <circle cx="10" cy="10" r="2.5" stroke="var(--card-border)" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="10" cy="10" r="1" fill="var(--card-border)" opacity="0.3"/>
  </svg>

  <div class="card-number">VII</div>
  <div class="card-name">Seven of Cups</div>

  <!-- ================ ILLUSTRATION ================ -->
  <div class="illustration">
    <svg width="500" height="800" viewBox="0 0 500 800" fill="none">

      <!-- Dreamy background — more atmospheric than other cards -->
      <radialGradient id="dreamglow" cx="50%" cy="35%" r="50%">
        <stop offset="0%" stop-color="var(--card-accent-light)" stop-opacity="0.08"/>
        <stop offset="50%" stop-color="var(--card-accent)" stop-opacity="0.04"/>
        <stop offset="100%" stop-color="var(--card-accent)" stop-opacity="0"/>
      </radialGradient>
      <rect width="500" height="800" fill="url(#dreamglow)"/>

      <!-- ======== CLOUD / MIST LAYER ======== -->
      <!-- Soft horizontal wave lines suggesting clouds/vapor -->
      <path d="M30 180 Q100 165 170 178 Q250 190 330 175 Q400 162 470 180"
            stroke="var(--card-accent-light)" stroke-width="0.8" fill="none" opacity="0.12"/>
      <path d="M40 210 Q120 195 200 208 Q280 222 360 205 Q430 192 480 210"
            stroke="var(--card-accent)" stroke-width="0.6" fill="none" opacity="0.1"/>
      <path d="M20 420 Q100 408 180 418 Q260 430 340 415 Q420 402 480 420"
            stroke="var(--card-accent-light)" stroke-width="0.8" fill="none" opacity="0.12"/>
      <path d="M50 448 Q130 435 210 445 Q290 458 370 442 Q440 430 470 448"
            stroke="var(--card-accent)" stroke-width="0.6" fill="none" opacity="0.1"/>
      <!-- Lower mist -->
      <path d="M30 540 Q120 528 200 538 Q300 550 400 535 Q450 528 480 540"
            stroke="var(--card-accent)" stroke-width="0.5" fill="none" opacity="0.08"/>

      <!-- ======== CUP TEMPLATE ======== -->
      <!-- Reusable chalice: wide bowl, narrow stem, small base -->
      <!-- Each cup is positioned absolutely and contains a unique vision symbol -->

      <!-- === TOP ROW: 3 cups === -->

      <!-- CUP 1 (top-left): THE CASTLE — ambition, status -->
      <g transform="translate(100, 80)">
        <!-- Chalice -->
        <path d="M-28 50 L-22 20 Q0 8 22 20 L28 50 Q0 58 -28 50Z"
              fill="var(--card-fill)" stroke="var(--card-line)" stroke-width="1.5"/>
        <line x1="-3" y1="50" x2="-3" y2="68" stroke="var(--card-line)" stroke-width="1.2"/>
        <line x1="3" y1="50" x2="3" y2="68" stroke="var(--card-line)" stroke-width="1.2"/>
        <ellipse cx="0" cy="70" rx="12" ry="4" fill="none" stroke="var(--card-line)" stroke-width="1"/>
        <line x1="-22" y1="20" x2="22" y2="20" stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.5"/>
        <!-- Vision: castle turrets -->
        <line x1="-10" y1="18" x2="-10" y2="-2" stroke="var(--card-line-light)" stroke-width="1.2" opacity="0.6"/>
        <line x1="0" y1="18" x2="0" y2="-8" stroke="var(--card-line-light)" stroke-width="1.2" opacity="0.7"/>
        <line x1="10" y1="18" x2="10" y2="-2" stroke="var(--card-line-light)" stroke-width="1.2" opacity="0.6"/>
        <!-- Battlements -->
        <rect x="-14" y="-4" width="8" height="3" fill="none" stroke="var(--card-line-light)" stroke-width="0.7" opacity="0.45"/>
        <rect x="-4" y="-10" width="8" height="3" fill="none" stroke="var(--card-line-light)" stroke-width="0.7" opacity="0.5"/>
        <rect x="6" y="-4" width="8" height="3" fill="none" stroke="var(--card-line-light)" stroke-width="0.7" opacity="0.45"/>
      </g>

      <!-- CUP 2 (top-center): THE GLOWING FIGURE — spirituality, self -->
      <g transform="translate(250, 55)">
        <path d="M-28 50 L-22 20 Q0 8 22 20 L28 50 Q0 58 -28 50Z"
              fill="var(--card-fill)" stroke="var(--card-line)" stroke-width="1.5"/>
        <line x1="-3" y1="50" x2="-3" y2="68" stroke="var(--card-line)" stroke-width="1.2"/>
        <line x1="3" y1="50" x2="3" y2="68" stroke="var(--card-line)" stroke-width="1.2"/>
        <ellipse cx="0" cy="70" rx="12" ry="4" fill="none" stroke="var(--card-line)" stroke-width="1"/>
        <line x1="-22" y1="20" x2="22" y2="20" stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.5"/>
        <!-- Vision: radiant figure silhouette -->
        <circle cx="0" cy="2" r="5" fill="none" stroke="var(--card-line-light)" stroke-width="1" opacity="0.7"/>
        <circle cx="0" cy="2" r="2" fill="var(--card-line)" opacity="0.5"/>
        <line x1="0" y1="7" x2="0" y2="18" stroke="var(--card-line-light)" stroke-width="1" opacity="0.55"/>
        <!-- Radiating lines around figure -->
        <line x1="-10" y1="2" x2="-15" y2="2" stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.35"/>
        <line x1="10" y1="2" x2="15" y2="2" stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.35"/>
        <line x1="0" y1="-8" x2="0" y2="-14" stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.35"/>
        <line x1="-7" y1="-5" x2="-11" y2="-9" stroke="var(--card-line-light)" stroke-width="0.5" opacity="0.25"/>
        <line x1="7" y1="-5" x2="11" y2="-9" stroke="var(--card-line-light)" stroke-width="0.5" opacity="0.25"/>
      </g>

      <!-- CUP 3 (top-right): JEWELS / WEALTH — material desire -->
      <g transform="translate(400, 80)">
        <path d="M-28 50 L-22 20 Q0 8 22 20 L28 50 Q0 58 -28 50Z"
              fill="var(--card-fill)" stroke="var(--card-line)" stroke-width="1.5"/>
        <line x1="-3" y1="50" x2="-3" y2="68" stroke="var(--card-line)" stroke-width="1.2"/>
        <line x1="3" y1="50" x2="3" y2="68" stroke="var(--card-line)" stroke-width="1.2"/>
        <ellipse cx="0" cy="70" rx="12" ry="4" fill="none" stroke="var(--card-line)" stroke-width="1"/>
        <line x1="-22" y1="20" x2="22" y2="20" stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.5"/>
        <!-- Vision: diamonds/jewels spilling -->
        <path d="M-6 15 L0 5 L6 15 Z" fill="none" stroke="var(--card-line-light)" stroke-width="1" opacity="0.7"/>
        <path d="M-12 10 L-8 2 L-4 10 Z" fill="none" stroke="var(--card-line-light)" stroke-width="0.8" opacity="0.5"/>
        <path d="M4 8 L8 0 L12 8 Z" fill="none" stroke="var(--card-line-light)" stroke-width="0.8" opacity="0.5"/>
        <circle cx="0" cy="10" r="1.5" fill="var(--card-line)" opacity="0.4"/>
        <circle cx="-8" cy="6" r="1" fill="var(--card-line)" opacity="0.3"/>
        <circle cx="8" cy="4" r="1" fill="var(--card-line)" opacity="0.3"/>
      </g>

      <!-- === MIDDLE ROW: 2 cups === -->

      <!-- CUP 4 (mid-left): THE WREATH — victory, glory -->
      <g transform="translate(155, 250)">
        <path d="M-28 50 L-22 20 Q0 8 22 20 L28 50 Q0 58 -28 50Z"
              fill="var(--card-fill)" stroke="var(--card-line)" stroke-width="1.5"/>
        <line x1="-3" y1="50" x2="-3" y2="68" stroke="var(--card-line)" stroke-width="1.2"/>
        <line x1="3" y1="50" x2="3" y2="68" stroke="var(--card-line)" stroke-width="1.2"/>
        <ellipse cx="0" cy="70" rx="12" ry="4" fill="none" stroke="var(--card-line)" stroke-width="1"/>
        <line x1="-22" y1="20" x2="22" y2="20" stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.5"/>
        <!-- Vision: laurel wreath circle -->
        <circle cx="0" cy="6" r="10" fill="none" stroke="var(--card-accent-light)" stroke-width="1.2" opacity="0.6"/>
        <circle cx="0" cy="6" r="7" fill="none" stroke="var(--card-accent)" stroke-width="0.6" opacity="0.35"/>
        <!-- Small leaf marks on wreath -->
        <line x1="-10" y1="4" x2="-12" y2="1" stroke="var(--card-accent-light)" stroke-width="0.6" opacity="0.35"/>
        <line x1="10" y1="4" x2="12" y2="1" stroke="var(--card-accent-light)" stroke-width="0.6" opacity="0.35"/>
        <line x1="-4" y1="-4" x2="-5" y2="-7" stroke="var(--card-accent-light)" stroke-width="0.6" opacity="0.35"/>
        <line x1="4" y1="-4" x2="5" y2="-7" stroke="var(--card-accent-light)" stroke-width="0.6" opacity="0.35"/>
      </g>

      <!-- CUP 5 (mid-right): THE DRAGON — fear, power, the unknown -->
      <g transform="translate(345, 250)">
        <path d="M-28 50 L-22 20 Q0 8 22 20 L28 50 Q0 58 -28 50Z"
              fill="var(--card-fill)" stroke="var(--card-line)" stroke-width="1.5"/>
        <line x1="-3" y1="50" x2="-3" y2="68" stroke="var(--card-line)" stroke-width="1.2"/>
        <line x1="3" y1="50" x2="3" y2="68" stroke="var(--card-line)" stroke-width="1.2"/>
        <ellipse cx="0" cy="70" rx="12" ry="4" fill="none" stroke="var(--card-line)" stroke-width="1"/>
        <line x1="-22" y1="20" x2="22" y2="20" stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.5"/>
        <!-- Vision: serpent/dragon — sinuous S-curve with head -->
        <path d="M-6 18 Q-10 10 -4 4 Q2 -2 8 4 Q14 10 8 16"
              stroke="var(--card-accent-light)" stroke-width="1.2" fill="none" opacity="0.6"/>
        <!-- Dragon head — small triangle -->
        <path d="M-8 18 L-6 14 L-3 18" fill="none" stroke="var(--card-accent-light)" stroke-width="1" opacity="0.5"/>
        <!-- Eye -->
        <circle cx="-5" cy="16" r="1.2" fill="var(--card-accent-light)" opacity="0.5"/>
        <!-- Small flame/breath -->
        <path d="M-9 16 Q-14 13 -12 10" stroke="var(--card-accent)" stroke-width="0.7" fill="none" opacity="0.35"/>
      </g>

      <!-- === BOTTOM ROW: 2 cups === -->

      <!-- CUP 6 (bottom-left): THE MASK — disguise, persona -->
      <g transform="translate(130, 410)">
        <path d="M-28 50 L-22 20 Q0 8 22 20 L28 50 Q0 58 -28 50Z"
              fill="var(--card-fill)" stroke="var(--card-line)" stroke-width="1.5"/>
        <line x1="-3" y1="50" x2="-3" y2="68" stroke="var(--card-line)" stroke-width="1.2"/>
        <line x1="3" y1="50" x2="3" y2="68" stroke="var(--card-line)" stroke-width="1.2"/>
        <ellipse cx="0" cy="70" rx="12" ry="4" fill="none" stroke="var(--card-line)" stroke-width="1"/>
        <line x1="-22" y1="20" x2="22" y2="20" stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.5"/>
        <!-- Vision: mask — oval with eye holes -->
        <ellipse cx="0" cy="6" rx="11" ry="9" fill="none" stroke="var(--card-line-light)" stroke-width="1" opacity="0.6"/>
        <ellipse cx="-5" cy="4" rx="3" ry="2" fill="none" stroke="var(--card-line-light)" stroke-width="0.8" opacity="0.5"/>
        <ellipse cx="5" cy="4" rx="3" ry="2" fill="none" stroke="var(--card-line-light)" stroke-width="0.8" opacity="0.5"/>
        <circle cx="-5" cy="4" r="1" fill="var(--card-line)" opacity="0.35"/>
        <circle cx="5" cy="4" r="1" fill="var(--card-line)" opacity="0.35"/>
      </g>

      <!-- CUP 7 (bottom-right): THE MYSTERY — veiled, unknown, a question mark -->
      <g transform="translate(370, 410)">
        <path d="M-28 50 L-22 20 Q0 8 22 20 L28 50 Q0 58 -28 50Z"
              fill="var(--card-fill)" stroke="var(--card-line)" stroke-width="1.5"/>
        <line x1="-3" y1="50" x2="-3" y2="68" stroke="var(--card-line)" stroke-width="1.2"/>
        <line x1="3" y1="50" x2="3" y2="68" stroke="var(--card-line)" stroke-width="1.2"/>
        <ellipse cx="0" cy="70" rx="12" ry="4" fill="none" stroke="var(--card-line)" stroke-width="1"/>
        <line x1="-22" y1="20" x2="22" y2="20" stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.5"/>
        <!-- Vision: mystery — shrouded, a veiled shape with glow -->
        <path d="M-8 16 Q-8 0 0 -4 Q8 0 8 16"
              stroke="var(--card-line-light)" stroke-width="1" fill="none" opacity="0.5"/>
        <!-- Veil lines -->
        <line x1="-6" y1="10" x2="-6" y2="18" stroke="var(--card-line-dim)" stroke-width="0.6" opacity="0.3"/>
        <line x1="0" y1="8" x2="0" y2="18" stroke="var(--card-line-dim)" stroke-width="0.6" opacity="0.3"/>
        <line x1="6" y1="10" x2="6" y2="18" stroke="var(--card-line-dim)" stroke-width="0.6" opacity="0.3"/>
        <!-- Glowing dot at center — the hidden thing -->
        <circle cx="0" cy="6" r="3" fill="var(--card-accent)" opacity="0.3"/>
        <circle cx="0" cy="6" r="1.5" fill="var(--card-accent-light)" opacity="0.45"/>
      </g>

      <!-- ======== FIGURE — seen from behind, looking up ======== -->
      <!-- Dark silhouette at bottom, gazing upward at the visions -->
      <radialGradient id="fglow" cx="50%" cy="85%" r="15%">
        <stop offset="0%" stop-color="var(--card-line)" stop-opacity="0.05"/>
        <stop offset="100%" stop-color="var(--card-line)" stop-opacity="0"/>
      </radialGradient>
      <rect y="550" width="500" height="250" fill="url(#fglow)"/>

      <!-- Body — triangular silhouette, wide shoulders, seen from back -->
      <path d="M250 600 L210 720 L290 720 Z"
            fill="var(--card-fill-light)" fill-opacity="0.45" stroke="var(--card-line)" stroke-width="1.5"/>

      <!-- Head — looking up (positioned higher than body, tilted back) -->
      <circle cx="250" cy="585" r="22" fill="var(--card-fill)" stroke="var(--card-line)" stroke-width="1.5"/>
      <circle cx="250" cy="585" r="14" fill="none" stroke="var(--card-line-light)" stroke-width="0.6" opacity="0.45"/>
      <!-- Upward gaze suggested -->
      <line x1="250" y1="575" x2="250" y2="565"
            stroke="var(--card-line-light)" stroke-width="0.7" opacity="0.3"/>

      <!-- Shoulders -->
      <path d="M232 605 Q210 615 195 630"
            stroke="var(--card-line)" stroke-width="1.2" fill="none" opacity="0.6"/>
      <path d="M268 605 Q290 615 305 630"
            stroke="var(--card-line)" stroke-width="1.2" fill="none" opacity="0.6"/>

      <!-- Hands raised slightly — reaching/gesturing toward the cups -->
      <path d="M195 630 Q185 625 178 618"
            stroke="var(--card-line)" stroke-width="1" fill="none" opacity="0.5"/>
      <path d="M305 630 Q315 625 322 618"
            stroke="var(--card-line)" stroke-width="1" fill="none" opacity="0.5"/>
      <!-- Open hands -->
      <line x1="178" y1="618" x2="172" y2="612" stroke="var(--card-line)" stroke-width="0.6" opacity="0.35"/>
      <line x1="178" y1="618" x2="174" y2="616" stroke="var(--card-line)" stroke-width="0.6" opacity="0.35"/>
      <line x1="322" y1="618" x2="328" y2="612" stroke="var(--card-line)" stroke-width="0.6" opacity="0.35"/>
      <line x1="322" y1="618" x2="326" y2="616" stroke="var(--card-line)" stroke-width="0.6" opacity="0.35"/>

      <!-- ======== CONNECTING ELEMENTS ======== -->
      <!-- Faint lines from figure upward to the cups — desire/longing -->
      <line x1="230" y1="575" x2="155" y2="480" stroke="var(--card-line-dim)" stroke-width="0.5" opacity="0.08" stroke-dasharray="4 6"/>
      <line x1="250" y1="570" x2="250" y2="485" stroke="var(--card-line-dim)" stroke-width="0.5" opacity="0.08" stroke-dasharray="4 6"/>
      <line x1="270" y1="575" x2="345" y2="480" stroke="var(--card-line-dim)" stroke-width="0.5" opacity="0.08" stroke-dasharray="4 6"/>

      <!-- Ground shadow -->
      <ellipse cx="250" cy="725" rx="60" ry="6"
               fill="var(--card-line-dim)" opacity="0.08"/>

    </svg>
  </div>
</div>
</body>
</html>
